{% extends 'base.html' %}

{% block title %}Inscription{% endblock %}

{% block content %}

<section class="login-section">
    <div class="login-container">
        <h2 class="login-title">NOUVEL AGENT</h2>

        {% if error %}
        <div class="error-message">
            {{ error }}
        </div>
        {% endif %}

        {% if success %}
        <div class="success-message">
            {{ success }}
        </div>
        {% endif %}

        <form action="#" method="POST">
            <div class="form-group">
                <label for="username">NOM DE CODE</label>
                <input type="text" id="username" name="username" placeholder="Choisissez votre nom de code" required>
            </div>

            <div class="form-group">
                <label for="password">MOT DE PASSE</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="form-group form-checkbox">
                <input type="checkbox" id="privacy" name="privacy" required>
                <label for="privacy">J'accepte les règles de confidentialité de l'agence</label>
            </div>

            <button type="submit" class="btn-primary">REJOINDRE L'AGENCE</button>
        </form>

        <p class="register-link">Déjà agent ?
            <a href="{{ url_for('index') }}">Accéder au réseau</a>
        </p>
    </div>
</section>

{% endblock %}
